schema_version = 1
kind = "wio.workload.loop"
role = "executor"
harness_name = "dbos"
target_repo = "./target"
target_ref = "3df88c4bcc3a2b73d91b765b459f4c7beb6a690c"

read = [
  ".workers/map.md",
  ".workers/work-items/",
  ".workers/areas/",
  ".workers/build.sh",
  ".workers/builds/",
  "target repository source and runtime setup"
]

write = [
  ".workers/.claims/",
  ".workers/work-items/",
  ".workers/workloads/",
  ".workers/runs/",
  ".workers/map.md",
  ".workers/build.sh",
  ".workers/builds/"
]

prompt = ".workers/loops/executor.md"
claim_dir = ".workers/.claims"
stop_when = "No ready work-item rung is claimable or every ready rung is blocked."
target_policy = "Use ./target as ignored read-only DBOS Transact Python source evidence. WIO cloud prepare ignores ./target and runs .workers/build.sh against the pinned target_ref."
cloud_project = "DBOS Workload Fresh"
cloud_project_id = "kn7a3jjm0frn1qgwpms30amdas88ztwy"
cloud_repo = "workersio/dbos-workload-fresh"
cloud_branch = "main"
clean_execution_policy = "Commit and push workload/build changes, prepare the WIO cloud project, and require clean tracked state before Formal/cloud execution; claims remain untracked."
local_execution_policy = "Local workload execution is for reproducing/minimizing/debugging cloud results or non-target sanity checks only; do not use it as primary executor evidence."
map_update_policy = "Write one .workers/runs/<WP-id>.md result file; update .workers/map.md only for durable run links; update the selected .workers/work-items/*.md only for mechanical rung status/run-link state."
