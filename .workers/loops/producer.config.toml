schema_version = 1
kind = "wio.workload.loop"
role = "producer"
harness_name = "dbos"
target_repo = "./target"
target_ref = "3df88c4bcc3a2b73d91b765b459f4c7beb6a690c"

read = [
  ".workers/map.md",
  ".workers/work-items/",
  ".workers/areas/",
  ".workers/workloads/",
  ".workers/runs/",
  "target repository source, docs, tests, git history, and runtime setup",
  "recently closed issues/PRs, issue-linked fixes, flaky or failed CI/test evidence, and local run instability when accessible"
]

write = [
  ".workers/map.md",
  ".workers/work-items/",
  ".workers/areas/"
]

prompt = ".workers/loops/producer.md"
stop_when = "No worthwhile new area or rung can be justified from current evidence."
target_policy = "Use ./target as ignored read-only DBOS Transact Python source evidence. Do not write harness state there."
write_policy = "Only write .workers/map.md, .workers/work-items/*.md, and .workers/areas/*.md; do not write workload code or executor results."
